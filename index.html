<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ring Button</title>
  <link rel="stylesheet" type="text/css" href="https://oocsi.id.tue.nl/assets/css/pico.indigo.min.css">
  <script type="text/javascript" src="https://oocsi.id.tue.nl/assets/js/oocsi-web.js"></script>
  <script type="text/javascript" src="https://oocsi.id.tue.nl/assets/js/things/oocsi-things.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: sans-serif;
      touch-action: none;
      user-select: none;
    }

    #ringBtn {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: radial-gradient(circle at 38% 32%, #ff6b6b, #c0392b);
      box-shadow:
        0 0 0 16px rgba(192,57,43,0.12),
        0 0 0 32px rgba(192,57,43,0.06),
        0 8px 32px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      gap: 10px;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.07s, box-shadow 0.07s;
    }

    #ringBtn:active {
      transform: scale(0.91);
      box-shadow: 0 0 0 6px rgba(192,57,43,0.2), 0 4px 16px rgba(0,0,0,0.5);
    }

    .bell { font-size: 3rem; pointer-events: none; }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #666;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #333;
      transition: background 0.2s;
    }
    .dot.on { background: #4caf50; box-shadow: 0 0 8px rgba(76,175,80,0.8); }
  </style>
</head>
<body>

  <!-- oocsiThings injects team dialog here → shows on /things page -->
  <div id="canvasContainer"></div>

  <button id="ringBtn" style="display:none" onpointerdown="sendRing()">
    <span class="bell">🔔</span>
    <span>RING</span>
  </button>

  <div class="status" style="display:none" id="statusRow">
    <span class="dot on" id="dot"></span>
    <span id="statusLabel">ready</span>
  </div>

  <script>
    // ── oocsiThings handles team selection + /things registration ─────────
    oocsiThingsConfig = { teamspace: "" };

    // this will hold the channel name once team is picked
    let channel = null;

    function thing() {
      // register so it appears on the /things overview page
      oocsiThings.register('Ring Button 🔔', 'ringbutton', [], ['ring']);

      // grab the channel name that oocsiThings constructed
      // format is always "OOCSI-things/team-X"
      channel = oocsiThings.channel || oocsiThings._channel;

      // fallback: read it from the team input if the above doesn't work
      if (!channel) {
        const teamInput = document.getElementById('team-choice');
        if (teamInput && teamInput.value) {
          channel = 'OOCSI-things/' + teamInput.value.toLowerCase().replace(' ', '-');
        }
      }

      // show UI
      document.getElementById('ringBtn').style.display   = 'flex';
      document.getElementById('statusRow').style.display = 'flex';
      document.getElementById('statusLabel').textContent  = 'connected to ' + channel;
    }

    // ── Send instantly via window.OOCSI directly — no framework delay ─────
    function sendRing() {
      if (!channel) return;
      // fast direct send, same as maze controller
      window.OOCSI.send(channel, { ringbutton_ring: 1 });
      // also tell oocsiThings we are active so it stays on /things page
      oocsiThings.activity();
    }
  </script>
</body>
</html>
