<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="https://oocsi.id.tue.nl/assets/css/pico.indigo.min.css">
  <script type="text/javascript" src="https://oocsi.id.tue.nl/assets/js/oocsi-web.js"></script>
  <script type="text/javascript" src="https://oocsi.id.tue.nl/assets/js/things/oocsi-things.min.js"></script>
  <style>
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      touch-action: none;
    }

    #ringBtn {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: radial-gradient(circle at 38% 32%, #ff6b6b, #c0392b);
      box-shadow: 0 0 0 18px rgba(192,57,43,0.12), 0 8px 32px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: sans-serif;
      font-size: 1rem;
      font-weight: 700;
      gap: 10px;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.07s;
    }

    #ringBtn:active {
      transform: scale(0.91);
    }

    .bell { font-size: 3rem; }
  </style>
</head>
<body>

  <div id="canvasContainer"></div>

  <button id="ringBtn" style="display:none" onpointerdown="sendRing()">
    <span class="bell">🔔</span>
    <span>RING</span>
  </button>

  <script>
    oocsiThingsConfig = { teamspace: "" };

    let ring;

    function thing() {
      oocsiThings.register('Ring Button 🔔', 'ringbutton', [], ['ring']);
      ring = oocsiThings.data('ring');
      document.getElementById('ringBtn').style.display = 'flex';
    }

    function sendRing() {
      ring(1);
      oocsiThings.activity();
    }
  </script>
</body>
</html>
